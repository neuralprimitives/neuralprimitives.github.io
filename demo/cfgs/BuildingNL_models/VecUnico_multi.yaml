optimizer : {
  type: AdamW,
  kwargs: {
  lr : 0.0001, 
  weight_decay : 0.0005
}}

scheduler: {
  type: LambdaLR,
  kwargs: {
  decay_step: 15,
  lr_decay: 0.9,
  lowest_decay: 0.002  # min lr = lowest_decay * lr
}}

bnmscheduler: {
  type: Lambda,
  kwargs: {
  decay_step: 21,
  bn_decay: 0.5,
  bn_momentum: 0.9,
  lowest_decay: 0.01
}}

dataset : {
  train : { _base_: cfgs/dataset_configs/BuildingNL.yaml,
            others: {subset: 'train'}},
  val : { _base_: cfgs/dataset_configs/BuildingNL.yaml,
            others: {subset: 'test'}},
  test : { _base_: cfgs/dataset_configs/BuildingNL.yaml,
            others: {subset: 'test'}}}

model : {
    NAME: VecUnico, 
    first_stage: 0,
    num_query: 512, 
    plane_query_num: 40,
    num_points: 16384,
    center_num: [512, 256],
    global_feature_dim: 1024, 
    encoder_type: vecgraph,
    decoder_type: fc,
    bias_epsilon: 0.000001,
    query_selection: True,
    encoder_config: {
      embed_dim: 384,
      depth: 6,
      num_heads: 6,
      k: 8,
      n_group: 2,
      mlp_ratio: 2.,
      block_style_list: ['vnattn-vngraph', 'vnattn', 'vnattn', 'vnattn', 'vnattn', 'vnattn'], 
      combine_style: 'concat',
      bias_epsilon: 0.000001,
      scale_factor: 1.0,
    },
    decoder_config: {
      embed_dim: 384,
      depth: 8,
      num_heads: 6,
      k: 8,
      n_group: 2,
      mlp_ratio: 2.,
      self_attn_block_style_list: ['vnattn-vngraph', 'vnattn', 'vnattn', 'vnattn', 'vnattn', 'vnattn', 'vnattn', 'vnattn'], 
      self_attn_combine_style: 'concat',
      cross_attn_block_style_list: ['vnattn-vngraph', 'vnattn', 'vnattn', 'vnattn', 'vnattn', 'vnattn', 'vnattn', 'vnattn'], 
      cross_attn_combine_style: 'concat',
      bias_epsilon: 0.000001,
      scale_factor: 1.0,
    },
    primitive_segmentation_config: {
      first_stage: 0,
      second_stage: 0,
      primitive_query_type: "static",
      primitive_query_num: 40,
      trans_dim: 384,
      primitive_decoder_cofig: {
      embed_dim: 384,
      depth: 4,
      num_heads: 6,
      k: 8,
      n_group: 2,
      mlp_ratio: 2.,
      self_attn_block_style_list: ['attn', 'attn', 'attn', 'attn'],
      self_attn_combine_style: 'concat',
      cross_attn_block_style_list: ['attn', 'attn', 'attn', 'attn'],
      cross_attn_combine_style: 'concat',
    }
}}

loss: {
  obj_class_loss_weight: 1.0,      # L_{cls} non-empty set
  mask_loss_weight: 2.5,           # L_{bce} + L_{dice}
  non_obj_class_loss_weight: 0.2,  # L_{cls} empty set
  plane_chamfer_loss_weight: 20.0, # L_{cp}
  chamfer_norm1_loss_weight: 20.0, # L_{co(fine)} + L_{co(coarse)} + L_{denoise}
  plane_normal_loss_weight: 1.0,
  first_stage: 0,
  second_stage: 0,
  third_stage: 600}

total_bs :  48
step_per_update : 1
max_epoch : 600
val_freq: 1

consider_metric: ['chamfer_norm1_loss', 'total_loss_stage2', 'total_loss_stage3']
